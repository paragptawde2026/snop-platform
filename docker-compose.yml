version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: snop_db
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-snop_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-snop_secret}
      POSTGRES_DB:       ${POSTGRES_DB:-snop_production}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL","pg_isready -U ${POSTGRES_USER:-snop_admin} -d ${POSTGRES_DB:-snop_production}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: snop_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD","redis-cli","ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: snop_backend
    restart: unless-stopped
    environment:
      DATABASE_URL:      postgresql+asyncpg://${POSTGRES_USER:-snop_admin}:${POSTGRES_PASSWORD:-snop_secret}@db:5432/${POSTGRES_DB:-snop_production}
      SYNC_DATABASE_URL: postgresql://${POSTGRES_USER:-snop_admin}:${POSTGRES_PASSWORD:-snop_secret}@db:5432/${POSTGRES_DB:-snop_production}
      REDIS_URL:         redis://redis:6379/0
      SECRET_KEY:        ${SECRET_KEY:-changeme_generate_32chars_in_prod}
      ENVIRONMENT:       ${ENVIRONMENT:-production}
      CORS_ORIGINS:      ${CORS_ORIGINS:-http://localhost:3000,http://localhost:5173}
    volumes:
      - upload_data:/app/uploads
    ports:
      - "8000:8000"
    depends_on:
      db:    { condition: service_healthy }
      redis: { condition: service_healthy }
    healthcheck:
      test: ["CMD","curl","-f","http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: snop_worker
    restart: unless-stopped
    command: celery -A app.core.celery_app worker --loglevel=info --concurrency=4 -Q optimization,default
    environment:
      DATABASE_URL:      postgresql+asyncpg://${POSTGRES_USER:-snop_admin}:${POSTGRES_PASSWORD:-snop_secret}@db:5432/${POSTGRES_DB:-snop_production}
      SYNC_DATABASE_URL: postgresql://${POSTGRES_USER:-snop_admin}:${POSTGRES_PASSWORD:-snop_secret}@db:5432/${POSTGRES_DB:-snop_production}
      REDIS_URL:         redis://redis:6379/0
      SECRET_KEY:        ${SECRET_KEY:-changeme_generate_32chars_in_prod}
    volumes:
      - upload_data:/app/uploads
    depends_on:
      db:    { condition: service_healthy }
      redis: { condition: service_healthy }

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
    container_name: snop_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

  nginx:
    image: nginx:1.25-alpine
    container_name: snop_nginx
    restart: unless-stopped
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
    depends_on:
      - backend
      - frontend

volumes:
  postgres_data:
  redis_data:
  upload_data:
